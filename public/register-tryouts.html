<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTB 2026 Tryout Registration | $75</title>
<meta name="description" content="Register for BTB Lacrosse 2026 Tryouts. $75 evaluation fee. July 15–17 & July 20–22 at Plainedge HS.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: #D22630; margin-bottom: 8px; text-align: center; }
  .logo-sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-bottom: 56px; text-align: center; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 10vw, 80px); letter-spacing: 2px; text-align: center; line-height: 1; margin-bottom: 12px; }
  .subtitle { font-size: 14px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-bottom: 16px; }
  .details { font-size: 14px; color: #888; text-align: center; margin-bottom: 56px; line-height: 1.8; }
  .details strong { color: #ccc; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 560px; }
  .btn { display: block; padding: 28px 24px; text-decoration: none; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; transition: all 0.25s ease; border: 2px solid transparent; }
  .btn-boys { background: #D22630; color: #fff; }
  .btn-boys:hover { background: #b81e29; transform: translateY(-3px); box-shadow: 0 12px 32px rgba(210,38,48,0.4); }
  .btn-girls { background: transparent; color: #fff; border-color: #D22630; }
  .btn-girls:hover { background: #D22630; transform: translateY(-3px); box-shadow: 0 12px 32px rgba(210,38,48,0.4); }
  .btn-label { display: block; font-size: 11px; letter-spacing: 2px; font-family: 'Montserrat', sans-serif; font-weight: 600; margin-top: 6px; opacity: 0.75; }
  .fee { display: inline-block; margin-top: 40px; font-size: 12px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; max-width: 320px; }
  }
</style>
</head>
<body>
  <div class="logo">BTB</div>
  <div class="logo-sub">Be The Best Lacrosse Club</div>
  <h1>2026 TRYOUTS</h1>
  <div class="subtitle">Select your program</div>
  <div class="details">
    <strong>July 15–17 &amp; July 20–22</strong><br>
    Plainedge HS · 241 Wyngate Dr, North Massapequa<br>
    Times assigned by grad year
  </div>
  <div class="grid">
    <a href="/register-boys-tryouts" class="btn btn-boys">
      BOYS
      <span class="btn-label">Register →</span>
    </a>
    <a href="/register-girls-tryouts" class="btn btn-girls">
      GIRLS
      <span class="btn-label">Register →</span>
    </a>
  </div>
  <span class="fee">$75 evaluation fee · Secure checkout via QuickBooks</span>
</body>
</html>
